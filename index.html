<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pirates: Naval Combat</title>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="lobby">

        </div>
        <p id="lobby-status"></p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
