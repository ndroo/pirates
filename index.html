<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pirates: Naval Combat</title>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="touch-controls" hidden>
      <div class="steer">
        <button id="tc-left">◀</button>
        <button id="tc-right">▶</button>
      </div>
      <button id="tc-mine">🛢</button>
      <button id="tc-dc">🧨</button>
      <button id="tc-sail">⛵</button>
      <button id="tc-dive">🌊</button>
      <button id="tc-mode">⚙</button>
      <button id="tc-board">🏆</button>
      <button id="tc-chat" hidden>💬</button>
      <button id="tc-fire">FIRE</button>
    </div>
    <div id="chat-bar" hidden>
      <input id="chat-input" maxlength="80" placeholder="Say something… (Enter to send, Esc to close)" autocomplete="off" />
    </div>
    <div id="lobby">
      <div id="lobby-panel">
        <h1>Pirates: Naval Combat</h1>

        <div class="screen" id="screen-home">
          <button id="solo-btn">Single player</button>
          <button id="multi-btn">Multiplayer</button>
        </div>

        <div class="screen" id="screen-multi" hidden>
          <input id="name-input" maxlength="14" placeholder="Your name (optional)" autocomplete="off" spellcheck="false" />
          <div class="host-options">
            <label>Max players
              <select id="cap-select"></select>
            </label>
            <label>Mode
              <select id="mode-select">
                <option value="elimination" selected>Last ship standing</option>
                <option value="respawn">Respawns — first to 5 sinks</option>
              </select>
            </label>
            <label>Block same-network joins
              <input type="checkbox" id="ip-check" />
            </label>
          </div>
          <button id="host-btn">Host a game</button>
          <div class="divider"><span>or join a friend</span></div>
          <div class="join-row">
            <input id="code-input" maxlength="4" placeholder="CODE" autocomplete="off" spellcheck="false" />
            <button id="join-btn">Join</button>
          </div>
          <button id="back-btn" class="subtle">Back</button>
        </div>

        <div class="screen" id="screen-invite" hidden>
          <p class="invite-text">You're invited to a sea battle!</p>
          <button id="invite-join-btn">Join the battle</button>
          <button id="invite-solo-btn" class="subtle">No thanks — play solo instead</button>
        </div>

        <div class="screen" id="screen-wait" hidden>
          <div class="join-row">
            <input id="share-link" readonly />
            <button id="copy-btn">Copy</button>
          </div>
          <p id="player-count"></p>
          <div id="player-list"></div>
          <button id="start-btn" disabled>Start battle</button>
          <button id="close-room-btn" class="subtle">Close room</button>
        </div>

        <p id="lobby-status"></p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
