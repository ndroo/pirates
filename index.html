<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pirates: Naval Combat</title>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="lobby">
      <div id="lobby-panel">
        <h1>Pirates: Naval Combat</h1>
        <button id="solo-btn">Single player (vs AI)</button>
        <div class="host-options">
          <label>Max players
            <select id="cap-select"></select>
          </label>
          <label class="checkbox">
            <input type="checkbox" id="ip-check" />
            Block same-network joins
          </label>
        </div>
        <button id="host-btn">Host a multiplayer game</button>
        <div class="join-row">
          <input id="code-input" maxlength="4" placeholder="CODE" autocomplete="off" spellcheck="false" />
          <button id="join-btn">Join</button>
        </div>
        <div class="join-row" id="share-row" hidden>
          <input id="share-link" readonly />
          <button id="copy-btn">Copy</button>
        </div>
        <div id="wait-room" hidden>
          <p id="player-list"></p>
          <button id="start-btn" disabled>Start battle</button>
        </div>
        <p id="lobby-status"></p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
